use_default_settings: true

server:
  secret_key: "ai_portfolio_analyser_custom_secret_key"  # Replaced with a solid string
  limiter: false          # disable rate limiting (internal use only)
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:                
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0

ui:
  static_use_hash: true